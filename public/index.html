<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { text-align: center; padding: 2rem; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h2>Verifying your connection...</h2>
        <p>Please wait while we secure your session.</p>
        <div class="loader"></div>
    </div>

    <script>
        // Dès que la page charge, on envoie les infos au backend
        window.onload = async () => {
            const deviceInfo = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screenRes: `${window.screen.width}x${window.screen.height}`
            };

            await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(deviceInfo)
            });

            // Optionnel : Rediriger après 3 secondes
            setTimeout(() => {
                window.location.href = "https://discord.com/app";
            }, 3000);
        };
    </script>
</body>
</html>
